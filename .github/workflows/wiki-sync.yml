# Wiki sync — docs → GitHub wiki, automated on push to main.
# Design + git-policy scope: docs/planning/WIKI-SYNC-PLAN.md
# (deterministic script, writes ONLY to the wiki repo — a generated
# artifact; the main repository's history is never touched).

name: Wiki sync

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "PROJECT-TODO.md"
      - "PROJECT-DONE.md"
      - "tools/sync_wiki.py"
      - ".github/workflows/wiki-sync.yml"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the pushed commit
        uses: actions/checkout@v4

      - name: Clone the wiki
        run: |
          git clone "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.wiki.git" "$RUNNER_TEMP/wiki"

      - name: Regenerate wiki pages
        run: python3 tools/sync_wiki.py --wiki "$RUNNER_TEMP/wiki"

      - name: Commit and push the wiki (only if changed)
        run: |
          cd "$RUNNER_TEMP/wiki"
          git config user.name "OEB Wiki Sync [bot]"
          git config user.email "61707678+twgmichael@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already current — nothing to push."
          else
            git commit -m "Sync docs @ ${GITHUB_SHA:0:7} (generated by tools/sync_wiki.py)"
            git push
          fi
