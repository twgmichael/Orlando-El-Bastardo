---
- name: Create secrets directory
  ansible.builtin.file:
    path: "{{ oeb_studio_harness_root }}/compose/secrets"
    state: directory
    owner: "{{ oeb_studio_harness_user }}"
    group: "{{ oeb_studio_harness_group }}"
    mode: "0700"
  become: true

- name: Write postgres password secret file
  ansible.builtin.copy:
    content: "{{ oeb_studio_harness_postgres_password }}"
    dest: "{{ oeb_studio_harness_root }}/compose/secrets/postgres_password.txt"
    owner: "{{ oeb_studio_harness_user }}"
    group: "{{ oeb_studio_harness_group }}"
    mode: "0600"
  become: true
  no_log: true

- name: Deploy harness environment file (Vault-protected values)
  ansible.builtin.template:
    src: harness.env.j2
    dest: "{{ oeb_studio_harness_root }}/compose/harness.env"
    owner: "{{ oeb_studio_harness_user }}"
    group: "{{ oeb_studio_harness_group }}"
    mode: "0640"
  become: true
  no_log: true
  notify: restart studio harness
