---
- name: Create data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ oeb_studio_harness_user }}"
    group: "{{ oeb_studio_harness_group }}"
    mode: "0750"
  loop: "{{ oeb_studio_harness_data_dirs }}"
  become: true

- name: Lock down postgres data directory
  ansible.builtin.file:
    path: "{{ oeb_studio_harness_root }}/postgres"
    mode: "0700"
  become: true
