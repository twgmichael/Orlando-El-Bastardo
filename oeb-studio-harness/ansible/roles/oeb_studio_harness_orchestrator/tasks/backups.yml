---
- name: Deploy backup script
  ansible.builtin.template:
    src: backup-postgres.sh.j2
    dest: /usr/local/bin/oeb-studio-harness-backup-postgres
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Deploy backup systemd service unit
  ansible.builtin.template:
    src: oeb-studio-harness-backup.service.j2
    dest: /etc/systemd/system/oeb-studio-harness-backup.service
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Deploy backup systemd timer unit
  ansible.builtin.template:
    src: oeb-studio-harness-backup.timer.j2
    dest: /etc/systemd/system/oeb-studio-harness-backup.timer
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Enable and start backup timer
  ansible.builtin.systemd:
    name: oeb-studio-harness-backup.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true
