<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Studio Harness{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <a class="logo" href="/">Studio Harness</a>
    <span class="tagline">Orlando El Bastardo Production Pipeline</span>
    <nav class="top-nav">
      <a href="/studio-chat">Studio Chat</a>
      <a href="/review/assets">Assets</a>
    </nav>
    <span class="clock" id="clock"></span>
  </header>
  {% block breadcrumbs %}{% endblock %}
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    function tick() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString();
    }
    tick();
    setInterval(tick, 1000);
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
