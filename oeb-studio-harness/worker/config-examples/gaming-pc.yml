worker_id: gaming-pc
platform: linux-x64
agent_version: "0.1.0"

capabilities:
  - llm.scene_spec
  - llm.blender_python
  - llm.general
  - blender.final_render
  - blender.preview_render
  - blender.command_line
  - gpu.cycles_render
  - gpu.texture_bake

resources:
  ram_gb: 64
  gpu_type: NVIDIA RTX 4090
  vram_gb: 24
  available_storage_gb: 1000

# harness_url and enrollment_token are set via env vars:
#   OEB_HARNESS_URL=http://oeb-studio.docker-pi
#   OEB_ENROLLMENT_TOKEN=<from vault>
# token_file stores the per-worker token after first registration.
token_file: ~/.oeb-harness-worker-token

poll_interval_seconds: 5
heartbeat_interval_seconds: 20
# SanDisk Professional PRO-G40 2 TB mounted at a stable Linux path.
# Keep this path stable even when the physical drive label changes.
artifact_store_root: ${OEB_ARTIFACT_STORE_ROOT:-/mnt/oeb-project/OEB-PRODUCTION/oeb-studio-harness/artifacts}
artifact_public_base_url: ${OEB_ARTIFACT_PUBLIC_BASE_URL:-http://oeb-studio.docker-pi}
output_root: ${OEB_OUTPUT_ROOT:-/mnt/oeb-project/OEB-PRODUCTION}
workspace_root: ${OEB_WORKSPACE_ROOT:-../../..}

adapters:
  ollama:
    base_url: http://localhost:11434
    default_model: qwen2.5-coder:32b
    timeout_seconds: 600
  blender:
    executable: ${OEB_BLENDER_EXECUTABLE:-blender}
    max_concurrent: 1
    timeout_seconds: 7200
